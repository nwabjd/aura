<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasha AI Mobile</title>
    <style>
        body { 
            background: #000; 
            color: #00ffcc; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0;
        }
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            border-bottom: 1px solid #333;
        }
        #input-area { 
            padding: 20px; 
            display: flex; 
        }
        input { 
            flex: 1; 
            background: #111; 
            color: #fff; 
            border: 1px solid #00ffcc; 
            padding: 15px; 
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="chat">
        <p>JARVIS: System online. How may I assist you today?</p>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Talk to JARVIS...">
    </div>

    <script>
        // Your live tunnel address
        const API_URL = "https://jockey-washstand-excluding.ngrok-free.dev"; 

        document.getElementById('userInput').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const text = e.target.value;
                if (!text) return;
                
                const chatBox = document.getElementById('chat');
                chatBox.innerHTML += `<p><b>You:</b> ${text}</p>`;
                e.target.value = '';

                try {
                    const res = await fetch(`${API_URL}/api/chat`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({text: text})
                    });
                    const data = await res.json();
                    chatBox.innerHTML += `<p><b>JARVIS:</b> ${data.reply}</p>`;
                    chatBox.scrollTop = chatBox.scrollHeight;
                } catch (error) {
                    chatBox.innerHTML += `<p style="color:red;">Error: Could not connect to JARVIS.</p>`;
                }
            }
        });
    </script>
</body>
</html>
